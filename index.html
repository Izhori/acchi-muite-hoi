<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1b1030" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="manifest" href="manifest.json" />
<title>あっち向いてホイ ✕ AI</title>
<style>
  :root{
    --bg1:#1b1030; --bg2:#3a1f5c; --accent:#ff5c8a; --accent2:#7c5cff;
    --ok:#39d98a; --ng:#ff6b6b; --card:rgba(255,255,255,.08); --line:rgba(255,255,255,.15);
    --skin:#ffe0d0; --skin-sh:#f2c3ad; --hair:#5b3a2e; --hair-hi:#7d5442;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
    color:#fff; min-height:100%;
    background:radial-gradient(1200px 600px at 20% -10%,#4a2a7a 0%,transparent 60%),
               radial-gradient(1000px 700px at 110% 20%,#7a2a5a 0%,transparent 55%),
               linear-gradient(160deg,var(--bg1),var(--bg2));
    display:flex;flex-direction:column;align-items:center;padding:16px;
  }
  h1{margin:4px 0 2px;font-size:clamp(20px,4vw,30px);letter-spacing:.02em;
     text-shadow:0 2px 12px rgba(0,0,0,.4)}
  h1 .ai{background:linear-gradient(90deg,var(--accent),var(--accent2));
     -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{opacity:.75;font-size:13px;margin-bottom:10px}
  .wrap{width:min(980px,100%);display:flex;flex-direction:column;gap:14px}
  .stage{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:760px){.stage{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;
     padding:14px;position:relative;overflow:hidden;backdrop-filter:blur(6px)}
  .panel h2{margin:0 0 8px;font-size:14px;opacity:.85;font-weight:600;display:flex;
     align-items:center;gap:8px}
  .badge{font-size:11px;padding:2px 8px;border-radius:999px;background:rgba(255,255,255,.12)}

  /* ---- AI face ---- */
  .faceScene{position:relative;perspective:620px;height:300px;display:flex;align-items:center;justify-content:center}
  #aiFace{width:230px;height:270px;transition:transform .5s cubic-bezier(.22,1,.36,1);
     transform-style:preserve-3d;transform-origin:center 55%;will-change:transform}
  .aiSpeech{position:absolute;left:50%;bottom:12px;transform:translateX(-50%) translateY(6px);
     background:#fff;color:#3a1f5c;font-weight:700;padding:6px 14px;border-radius:14px;
     font-size:14px;opacity:0;transition:.25s;box-shadow:0 6px 18px rgba(0,0,0,.3);white-space:nowrap}
  .aiSpeech.show{opacity:1;transform:translateX(-50%)}
  .aiSpeech:after{content:"";position:absolute;top:-6px;left:50%;margin-left:-6px;width:12px;height:12px;
     background:#fff;transform:rotate(45deg)}

  /* ---- camera ---- */
  .camBox{position:relative;border-radius:14px;overflow:hidden;background:#000;aspect-ratio:4/3}
  video,#overlay{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
     transform:scaleX(-1)}
  #overlay{pointer-events:none}
  .camHint{position:absolute;left:0;right:0;bottom:0;padding:6px 10px;font-size:12px;
     background:linear-gradient(transparent,rgba(0,0,0,.6));z-index:2}
  .detTag{position:absolute;top:8px;left:8px;z-index:2;background:rgba(0,0,0,.5);
     padding:4px 10px;border-radius:999px;font-size:12px}

  /* ---- center status ---- */
  .status{text-align:center;min-height:64px;display:flex;flex-direction:column;
     align-items:center;justify-content:center;gap:4px}
  .phase{font-size:clamp(26px,6vw,44px);font-weight:800;letter-spacing:.04em;
     text-shadow:0 3px 16px rgba(0,0,0,.45);line-height:1.1}
  .phase.flash{animation:pop .35s}
  @keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1)}}
  .result{font-size:15px;opacity:.9}
  .result.win{color:var(--ok)} .result.lose{color:var(--ng)}

  /* ---- score & controls ---- */
  .bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center}
  .score{display:flex;gap:18px;font-weight:700;font-size:16px}
  .score b{font-size:22px}
  .score .me b{color:var(--ok)} .score .ai b{color:var(--accent)}
  button{cursor:pointer;border:none;border-radius:12px;padding:11px 20px;font-size:15px;
     font-weight:700;color:#fff;background:linear-gradient(90deg,var(--accent),var(--accent2));
     box-shadow:0 6px 18px rgba(124,92,255,.35);transition:.15s}
  button:hover{filter:brightness(1.08);transform:translateY(-1px)}
  button:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
  button.sec{background:rgba(255,255,255,.12);box-shadow:none}
  .controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}

  .tools{display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:center;
     font-size:13px;opacity:.9}
  .tools label{display:flex;align-items:center;gap:6px}
  input[type=range]{width:120px;accent-color:var(--accent)}
  .debug{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;opacity:.8;
     text-align:center;min-height:18px}
  details{font-size:13px;opacity:.92;background:var(--card);border:1px solid var(--line);
     border-radius:14px;padding:8px 14px}
  details summary{cursor:pointer;font-weight:700;padding:4px 0}
  details ol{margin:6px 0 4px;padding-left:20px;line-height:1.6}
  .warn{background:rgba(255,107,107,.14);border:1px solid rgba(255,107,107,.4);
     color:#ffd7d7;padding:10px 14px;border-radius:12px;font-size:13px;display:none}
  .dir-arrow{font-size:56px;line-height:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))}

  /* ---- capture cue "回答してください" ---- */
  .cue{position:absolute;left:50%;top:12px;transform:translateX(-50%) translateY(-10px);
     z-index:6;min-width:200px;background:linear-gradient(90deg,var(--accent),var(--accent2));
     color:#fff;font-weight:800;font-size:clamp(16px,4vw,22px);padding:10px 18px;border-radius:16px;
     box-shadow:0 10px 28px rgba(0,0,0,.45);opacity:0;transition:.15s;text-align:center;
     pointer-events:none;white-space:nowrap}
  .cue.show{opacity:1;transform:translateX(-50%) scale(1.04)}
  .cue .bar{height:6px;background:rgba(255,255,255,.35);border-radius:4px;margin-top:8px;overflow:hidden}
  .cue .bar > i{display:block;height:100%;background:#fff;width:100%;transform-origin:left}
  .cue.pulse{animation:cuePulse .45s infinite alternate}
  @keyframes cuePulse{from{box-shadow:0 10px 28px rgba(255,92,138,.5)}
    to{box-shadow:0 10px 40px rgba(124,92,255,.9)}}

  /* ---- AI hand reveal ---- */
  .aiHand{position:absolute;inset:0;z-index:7;display:flex;flex-direction:column;
     align-items:center;justify-content:center;gap:6px;opacity:0;pointer-events:none;
     transition:.25s;background:radial-gradient(circle at 50% 45%,rgba(27,16,48,.72),rgba(27,16,48,.92))}
  .aiHand.show{opacity:1}
  .aiHand svg{width:150px;height:180px;filter:drop-shadow(0 8px 20px rgba(0,0,0,.5));
     animation:handPop .3s cubic-bezier(.2,1.3,.4,1)}
  @keyframes handPop{0%{transform:scale(.4) rotate(-12deg);opacity:0}
    100%{transform:scale(1) rotate(0);opacity:1}}
  .aiHand .lbl{font-weight:800;font-size:26px;letter-spacing:.08em;
     text-shadow:0 2px 10px rgba(0,0,0,.5)}

  /* ---- AI janken hand shown beside the face ---- */
  .aiHandSide{position:absolute;right:8px;top:50%;z-index:4;
     display:flex;flex-direction:column;align-items:center;gap:2px;
     opacity:0;transform:translateY(-50%) scale(.6);transition:.25s;pointer-events:none}
  .aiHandSide.show{opacity:1;transform:translateY(-50%) scale(1)}
  .aiHandSide svg{width:84px;height:100px;filter:drop-shadow(0 6px 14px rgba(0,0,0,.45))}
  .aiHandSide .lbl{font-weight:800;font-size:16px;
     background:rgba(0,0,0,.35);padding:1px 10px;border-radius:999px}

  /* ===== full-stage layout: AI center大, camera右下小 ===== */
  body{padding:0;justify-content:flex-start}
  h1,.sub{display:none}
  .hiddenState{display:none}
  .game{position:relative;width:min(1100px,100%);height:100vh;height:100dvh;max-height:100dvh;
     display:flex;align-items:center;justify-content:center;overflow:hidden}
  .faceScene{position:relative;perspective:1000px;width:100%;height:min(97vh,1000px);
     display:flex;align-items:center;justify-content:center}
  #aiImg,#aiVid{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
     height:min(95vh,940px);max-width:99%;width:auto;object-fit:contain;border-radius:16px;
     box-shadow:0 12px 40px rgba(0,0,0,.45);transition:opacity .35s ease}
  #aiImg{opacity:1;z-index:1}
  #aiVid{opacity:0;z-index:2;background:#000}
  /* overlays fade */
  .startOverlay,.rewardOverlay,#videoOverlay,#endOverlay{transition:opacity .35s ease}
  .aiSpeech{font-size:15px;bottom:7%}
  /* minimal telop（画面上部テロップは非表示） */
  .telop{display:none;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:5;
     text-align:center;pointer-events:none;max-width:82%}
  .telop .phase{font-size:15px;font-weight:700;opacity:.82;letter-spacing:.02em;
     text-shadow:0 1px 5px rgba(0,0,0,.6)}
  .telop .phase.flash{animation:pop .3s}
  .telop .result{display:block;font-size:11px;opacity:.6;margin-top:2px}
  .telop .result.win{color:var(--ok)} .telop .result.lose{color:var(--ng)}
  /* mini score */
  .scoreMini{position:absolute;top:8px;left:12px;z-index:5;display:flex;gap:12px;
     font-size:13px;font-weight:700;opacity:.85}
  .scoreMini .me b{color:var(--ok);font-size:16px} .scoreMini .ai b{color:var(--accent);font-size:16px}
  .volCtl{position:absolute;top:8px;right:12px;z-index:9;display:flex;align-items:center;gap:6px}
  .vbtn{font-size:15px;font-weight:700;padding:7px 10px;background:rgba(255,255,255,.16);border:none;border-radius:10px;color:#fff;cursor:pointer;line-height:1}
  .vbtn:active{background:rgba(255,255,255,.32)}
  .volPct{font-size:12px;opacity:.85;min-width:38px;text-align:center}
  /* camera PiP bottom-right */
  .cam{position:absolute;right:14px;bottom:14px;width:min(32vw,240px);aspect-ratio:4/3;
     border-radius:14px;overflow:hidden;background:#000;z-index:6;
     border:2px solid rgba(255,255,255,.28);box-shadow:0 10px 26px rgba(0,0,0,.5)}
  .cam .detTag{font-size:11px;padding:3px 8px}
  .cam .cue{min-width:0;font-size:12px;padding:6px 10px;top:6px}
  .cam .cue .bar{height:4px;margin-top:5px}
  .cam .camHint{font-size:10px;padding:4px 8px}
  .camBtn{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);z-index:9;
     font-size:12px;padding:8px 14px;white-space:nowrap}
  /* start overlay */
  .startOverlay{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;
     align-items:center;justify-content:center;gap:16px;text-align:center;
     background:radial-gradient(circle at 50% 40%,rgba(40,24,80,.5),rgba(20,12,40,.82));
     backdrop-filter:blur(3px)}
  .startTitle{font-size:clamp(24px,5vw,40px);font-weight:800;text-shadow:0 3px 16px rgba(0,0,0,.5)}
  .startTitle .ai{background:linear-gradient(90deg,var(--accent),var(--accent2));
     -webkit-background-clip:text;background-clip:text;color:transparent}
  #startBtn{font-size:20px;padding:16px 36px}
  .startNote{font-size:13px;opacity:.8}
  /* mini controls */
  .miniControls{position:absolute;left:12px;bottom:12px;z-index:7;display:flex;gap:6px}
  button.mini{font-size:12px;padding:8px 11px;background:rgba(255,255,255,.14);
     box-shadow:none;border-radius:10px;font-weight:700}
  /* settings / debug / help under the stage */
  #settingsPanel{width:min(680px,92%);margin:12px auto;background:var(--card);
     border:1px solid var(--line);border-radius:14px;padding:12px 16px}
  .debug{margin:6px auto 18px}
  details{width:min(680px,92%);margin:0 auto 24px}

  /* ===== 勝利ご褒美 ===== */
  .rewardOverlay{position:absolute;inset:0;z-index:22;display:none;flex-direction:column;
     align-items:center;justify-content:center;gap:16px;text-align:center;
     background:radial-gradient(circle at 50% 40%,rgba(70,34,104,.55),rgba(20,12,40,.86));
     backdrop-filter:blur(3px)}
  .rewardOverlay .rtitle{font-size:clamp(22px,4vw,34px);font-weight:800;text-shadow:0 3px 14px rgba(0,0,0,.5)}
  .rewardOverlay .giftBox{cursor:pointer;animation:giftBounce 1.2s ease-in-out infinite}
  @keyframes giftBounce{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(2deg)}}
  .rewardBtns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  #videoOverlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;background:#000}
  #videoOverlay video{width:auto;height:auto;max-width:94vw;max-height:90vh;object-fit:contain;border-radius:12px}
  #endOverlay{position:fixed;inset:0;z-index:61;display:none;flex-direction:column;
     align-items:center;justify-content:center;gap:14px;text-align:center;
     background:radial-gradient(circle at 50% 40%,rgba(40,24,80,.7),rgba(12,8,24,.96))}
  #endOverlay .etitle{font-size:clamp(28px,6vw,48px);font-weight:800;
     background:linear-gradient(90deg,var(--accent),var(--accent2));
     -webkit-background-clip:text;background-clip:text;color:transparent}

  /* ===== iPhone / mobile ===== */
  *{-webkit-tap-highlight-color:transparent}
  html,body{-webkit-text-size-adjust:100%;overscroll-behavior:none}
  @supports(padding:max(0px)){
    .scoreMini{top:max(8px,env(safe-area-inset-top));left:max(12px,env(safe-area-inset-left))}
    .volCtl{top:max(8px,env(safe-area-inset-top));right:max(12px,env(safe-area-inset-right))}
    .telop{top:max(10px,env(safe-area-inset-top))}
    .miniControls{left:max(12px,env(safe-area-inset-left));bottom:max(12px,env(safe-area-inset-bottom))}
    .cam{right:max(12px,env(safe-area-inset-right));bottom:max(12px,env(safe-area-inset-bottom))}
  }
  @media (max-width:600px){
    .cam{width:40vw;max-width:180px;bottom:calc(78px + env(safe-area-inset-bottom))}
    button.mini{padding:11px 13px;font-size:14px}
    #startBtn{font-size:19px;padding:16px 30px}
    .camBtn{font-size:13px;padding:11px 16px}
    .rewardBtns{flex-direction:column}
    .rewardBtns button{padding:14px 20px;font-size:16px}
    #settingsPanel input[type=range]{width:150px}
  }
</style>
</head>
<body>
  <div class="game" id="game">
    <div id="warn" class="warn"></div>
    <span id="aiState" class="hiddenState"></span>
    <span id="camState" class="hiddenState"></span>

    <!-- AI character: big & centered -->
    <div class="faceScene" id="faceScene">
      <div class="aiSpeech" id="aiSpeech"></div>
      <img id="aiImg" src="idle.png" alt="AI">
      <video id="aiVid" muted playsinline preload="auto"></video>
      <div class="aiHand" id="aiHand"></div>
      <div class="aiHandSide" id="aiHandSide"></div>
    </div>

    <!-- minimal telop -->
    <div class="telop">
      <span class="phase" id="phase">スタート待ち</span>
      <span class="result" id="resultLine"></span>
    </div>

    <!-- mini score -->
    <div class="scoreMini">
      <span class="me">YOU <b id="scoreMe">0</b></span>
      <span class="ai">AI <b id="scoreAi">0</b></span>
    </div>

    <!-- 音量調整（サイドボタンが効かないiPhone用） -->
    <div class="volCtl" id="volCtl">
      <button id="volDown" class="vbtn" aria-label="音量ダウン">🔉−</button>
      <span id="volPct" class="volPct">90%</span>
      <button id="volUp" class="vbtn" aria-label="音量アップ">🔊＋</button>
    </div>

    <!-- camera: small, bottom-right -->
    <div class="cam" id="cam">
      <video id="video" playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div class="detTag" id="detTag">—</div>
      <div class="cue" id="cue"><span id="cueText">回答して！</span>
        <div class="bar"><i id="cueBar"></i></div></div>
      <div class="camHint" id="camHint"></div>
    </div>

    <!-- start overlay (center) -->
    <div class="startOverlay" id="startOverlay">
      <div class="startTitle">あっち向いてホイ <span class="ai">✕ AI</span></div>
      <button id="startBtn">▶ ゲーム開始</button>
      <div class="startNote">カメラとマイクを許可してください（Chrome / Edge 推奨）</div>
    </div>

    <!-- mini controls -->
    <div class="miniControls">
      <button id="playBtn" class="mini" disabled>✊ じゃんけん</button>
      <button id="stopBtn" class="mini" disabled>■ 中止</button>
      <button id="resetBtn" class="mini" title="スコアリセット">↺</button>
      <button id="settingsBtn" class="mini" title="設定">⚙</button>
    </div>

    <!-- reward (あなたの勝ち) -->
    <div class="rewardOverlay" id="rewardOverlay">
      <div class="rtitle">ご褒美だよ🎁</div>
      <div class="giftBox" id="giftBox" title="プレゼントを受け取る">
        <svg viewBox="0 0 200 200" width="190" height="190" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gbox" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#ff7ea8"/><stop offset="1" stop-color="#e0407a"/></linearGradient>
            <linearGradient id="glid" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#ff9ec0"/><stop offset="1" stop-color="#ff6fa0"/></linearGradient>
          </defs>
          <rect x="40" y="88" width="120" height="86" rx="8" fill="url(#gbox)"/>
          <rect x="34" y="66" width="132" height="30" rx="7" fill="url(#glid)"/>
          <rect x="92" y="66" width="16" height="108" fill="#ffd76a"/>
          <rect x="34" y="66" width="132" height="8" fill="#ffd76a" opacity=".9"/>
          <path d="M100 66 C70 40 46 46 58 62 C66 72 88 66 100 66 Z" fill="#ffd76a"/>
          <path d="M100 66 C130 40 154 46 142 62 C134 72 112 66 100 66 Z" fill="#ffd76a"/>
          <circle cx="100" cy="64" r="8" fill="#ffe08a"/>
          <g fill="#fff" opacity=".85">
            <circle cx="150" cy="40" r="3"/><circle cx="60" cy="34" r="2.5"/>
            <circle cx="172" cy="82" r="2"/><circle cx="30" cy="72" r="2.5"/></g>
        </svg>
      </div>
      <div class="rewardBtns">
        <button id="continueBtn" class="sec">▶ ゲームを続ける</button>
        <button id="giftBtn">🎁 プレゼントを受取る</button>
      </div>
    </div>
  </div>

  <!-- reward video (fullscreen) -->
  <div id="videoOverlay">
    <video id="rewardVideo" src="reward.mp4" playsinline preload="auto"></video>
  </div>
  <!-- game end -->
  <div id="endOverlay">
    <div class="etitle">ゲーム終了</div>
    <div class="startNote">遊んでくれてありがとう！🎉</div>
  </div>

    <!-- Settings (collapsible) -->
    <div class="tools" id="settingsPanel" style="display:none">
      <label>顔の認識精度 <input id="faceSens" type="range" min="0.04" max="0.22" step="0.01" value="0.11"></label>
      <label>ジャンケンの認識精度 <input id="handSens" type="range" min="0.2" max="0.9" step="0.05" value="0.5"></label>
      <label><input id="autoLoop" type="checkbox" checked> 連続プレイ</label>
      <label><input id="voiceChk" type="checkbox" checked> 🔊 音声</label>
    </div>
    <div class="debug" id="debug"></div>

<!-- ===== moe-chara Web Component (embedded from moe-chara.js) ===== -->
<script type="module">
const DEFAULT_PAL = {
  hairColor: '#b98a5e', hairShade: '#98693f', hairLight: '#d9ab7d',
  skin: '#ffe7d6', blush: '#ff9db2', eyeColor: '#b07a3f',
  outfit: '#ffd7e1', outfitTrim: '#ffffff', ribbon: '#ff9ab6',
};
const POSES = ['center', 'up', 'down', 'left', 'right'];
const EXPRESSIONS = ['idle', 'win', 'lose', 'draw'];
function headTransform(pose) {
  switch (pose) {
    case 'up':    return 'translate(0px,-5px) rotate(-6deg)';
    case 'down':  return 'translate(0px,5px) rotate(6deg)';
    case 'left':  return 'translate(-14px,1px) rotate(-9deg) scaleX(0.9)';
    case 'right': return 'translate(14px,1px) rotate(9deg) scaleX(0.9)';
    default:      return 'translate(0px,0px) rotate(0deg)';
  }
}
function pupilShift(pose) {
  switch (pose) {
    case 'up':    return [0, -5];
    case 'down':  return [0, 5];
    case 'left':  return [-7, 1];
    case 'right': return [7, 1];
    default:      return [0, 0];
  }
}
function bodyTransform(expr) {
  if (expr === 'win')  return 'translate(0px,-8px)';

    try{ aiVid.currentTime=0; }catch(e){}
    try{ aiVid.playbackRate=rate; }catch(e){}        // 再生速度（0.5でスロー＝再生時間2倍）
    let done=false, safetyT=null;
    const fin=()=>{ if(done) return; done=true; if(safetyT) clearTimeout(safetyT);
      if(!keepLast){ aiVid.style.opacity="0"; aiImg.style.opacity="1"; } res(); };
    // iOSはsrc変更やplayで速度がリセットされるため再設定＋実尺で安全弁を精密化
    aiVid.onloadedmetadata=()=>{
      try{ aiVid.playbackRate=rate; }catch(e){}
      const d=aiVid.duration;

    };
    aiVid.onended=fin; aiVid.onerror=fin;
    try{ aiVid.playbackRate=rate; }catch(e){}
    const p=aiVid.play(); if(p&&p.catch) p.catch(()=>{});
    try{ aiVid.playbackRate=rate; }catch(e){}
    safetyT=setTimeout(fin, Math.max(9000, 10000/Math.max(0.1,rate)));   // 初期安全弁（メタデータ取得後に精密化）
  });
}

/* ---------- detection helpers ---------- */
let handLm=null, faceLm=null, running=false, camReady=false;
let neutral=null; // calibrated neutral face metrics

// flip x so it matches the mirrored (selfie) display
const fx = x => 1 - x;
const DIRS=["up","down","left","right"];
const DIR_JP={up:"上⬆️",down:"下⬇️",left:"左⬅️",right:"右➡️",center:"正面"};
const DIR_ARROW={up:"⬆️",down:"⬇️",left:"⬅️",right:"➡️",center:"・"};
const DIR_WORD={up:"うえ",down:"した",left:"ひだり",right:"みぎ",center:"しょうめん"};

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

/* --- janken from hand landmarks --- */
function fingerExtended(lm, tip, pip, mcp){
  // extended if tip is farther from wrist than pip (works in most orientations)
  const w=lm[0];
  return dist(lm[tip],w) > dist(lm[pip],w)*1.05;
}
function detectJanken(lm){
  const idx=fingerExtended(lm,8,6,5);
  const mid=fingerExtended(lm,12,10,9);
  const rng=fingerExtended(lm,16,14,13);
  const pnk=fingerExtended(lm,20,18,17);
  // thumb: distance of tip from index-mcp vs thumb-mcp span
  const thumb = dist(lm[4],lm[17]) > dist(lm[2],lm[17])*1.15;
  const cnt=[idx,mid,rng,pnk].filter(Boolean).length + (thumb?1:0);
  const fourFingers=[idx,mid,rng,pnk].filter(Boolean).length;
  if(fourFingers<=0) return "rock";
  if(idx&&mid&&!rng&&!pnk) return "scissors";
  if(fourFingers>=3) return "paper";
  if(cnt<=1) return "rock";
  return null; // ambiguous
}

/* --- pointing direction from index finger --- */
function detectPointDir(lm){
  const mcp=lm[5], tip=lm[8];
  const vx=fx(tip.x)-fx(mcp.x);
  const vy=tip.y-mcp.y; // y grows downward
  if(Math.hypot(vx,vy)<0.03) return null;
  if(Math.abs(vx)>Math.abs(vy)) return vx>0?"left":"right";
  return vy>0?"down":"up";
}

/* --- top-of-head hair coverage: 下を向くほど頭頂の髪が画面に増える --- */
const hairCanvas=document.createElement("canvas"); hairCanvas.width=96; hairCanvas.height=72;
const hctx=hairCanvas.getContext("2d",{willReadFrequently:true});
let faceEMA=null;   // 平滑化した顔メトリクス
function topHairCoverage(lm){
  try{
    const W=hairCanvas.width, H=hairCanvas.height;
    hctx.drawImage(video,0,0,W,H);           // 現在フレームを縮小描画（未反転＝ランドマークと同じ座標系）
    const top=lm[10], nose=lm[1], cL=lm[234], cR=lm[454], chin=lm[152];
    const cx=nose.x, halfW=Math.abs(cR.x-cL.x)*0.5*0.95;
    const faceH=Math.max(0.05, chin.y-top.y);
    const band=faceH*0.6;                    // 顔の上側の帯（頭頂側）
    const x0=Math.floor(Math.max(0,cx-halfW)*W), y0=Math.floor(Math.max(0,top.y-band)*H);
    const w=Math.floor(Math.min(1,cx+halfW)*W)-x0, h=Math.floor(Math.max(0,top.y)*H)-y0;
    if(w<2||h<2) return null;
    const data=hctx.getImageData(x0,y0,w,h).data;
    let dark=0,tot=0;
    for(let i=0;i<data.length;i+=4){
      const lum=data[i]*0.299+data[i+1]*0.587+data[i+2]*0.114;
      if(lum<95) dark++;                     // 髪(暗部)の割合
      tot++;
    }
    return tot? dark/tot : null;
  }catch(e){ return null; }
}

/* --- face orientation --- */
function faceMetrics(lm){
  const nose=lm[1];
  const cL=lm[234], cR=lm[454];        // cheeks (image space)
  const eyeY=(lm[33].y+lm[263].y)/2;   // 目のライン
  const noseY=lm[1].y, chinY=lm[152].y;
  // work in flipped x
  const nx=fx(nose.x), lx=fx(cL.x), rx=fx(cR.x);
  const left=Math.min(lx,rx), right=Math.max(lx,rx);
  const yaw=(nx-left)/Math.max(1e-4,(right-left)) - 0.5;      // <0 screen-left, >0 screen-right
  // pitch: 鼻先が「目〜あご」のどこにあるか（下を向くと上昇 / 上を向くと下降）
  const upper=Math.max(1e-4, noseY-eyeY);   // 目→鼻
  const lower=Math.max(1e-4, chinY-noseY);  // 鼻→あご
  const pitch=upper/(upper+lower);
  const hair=topHairCoverage(lm);           // 頭頂の髪の割合（下向きで増える）
  return {yaw,pitch,hair};
}
function classifyFace(m){
  if(!neutral) return "center";
  const dYaw=m.yaw-neutral.yaw;
  let dPitch=m.pitch-neutral.pitch;
  // 頭頂の髪が増えていたら「下向き」を後押し（減っていたら「上向き」寄り）
  if(m.hair!=null && neutral.hair!=null) dPitch += 0.35*(m.hair-neutral.hair);
  const t=parseFloat(faceSens.value);
  const tp=t*0.5;               // pitch(比率)は振れ幅が小さいので閾値を下げる
  // 各軸を自分の閾値で正規化し、いちばん強く出ている方向を採用
  const cand=[];
  if(dYaw>  t)  cand.push(["right",  dYaw/t]);
  if(dYaw< -t)  cand.push(["left",  -dYaw/t]);
  if(dPitch> tp) cand.push(["down",  dPitch/tp]);   // 下向き＝比率が上がる
  if(dPitch<-tp) cand.push(["up",   -dPitch/tp]);   // 上向き＝比率が下がる
  if(!cand.length) return "center";
  cand.sort((a,b)=>b[1]-a[1]);
  return cand[0][0];
}

/* live detection results (latest) */
let live={hand:null, janken:null, point:null, face:"center", faceM:null};

function loop(){
  if(running && camReady && video.readyState>=2){
    const t=performance.now();
    // hand
    let hr=null;
    try{ hr=handLm.detectForVideo(video,t); }catch(e){}
    if(hr && hr.landmarks && hr.landmarks.length){
      const lm=hr.landmarks[0];
      live.hand=lm; live.janken=detectJanken(lm); live.point=detectPointDir(lm);
    } else { live.hand=null; live.janken=null; live.point=null; }
    // face
    let fr=null;
    try{ fr=faceLm.detectForVideo(video,t+1); }catch(e){}
    if(fr && fr.faceLandmarks && fr.faceLandmarks.length){
      const lm=fr.faceLandmarks[0];
      const m=faceMetrics(lm);
      const a=0.4;   // 数フレーム平滑化してブレを抑える
      if(!faceEMA) faceEMA=m;
      else faceEMA={
        yaw:  faceEMA.yaw*(1-a)+m.yaw*a,
        pitch:faceEMA.pitch*(1-a)+m.pitch*a,
        hair:(m.hair==null)?faceEMA.hair:((faceEMA.hair==null)?m.hair:faceEMA.hair*(1-a)+m.hair*a),
      };
      live.faceM=faceEMA; live.face=classifyFace(faceEMA);
    } else { live.faceM=null; live.face="center"; faceEMA=null; }

    drawOverlay();
    updateDetTag();
  }
  requestAnimationFrame(loop);
}

function drawOverlay(){

/* ---------- voice (all narration is spoken) ---------- */
let jaVoice=null, voiceOn=true;
function pickVoice(){
  if(!("speechSynthesis" in window)) return;
  const vs=speechSynthesis.getVoices();
  const ja=vs.filter(v=>/^ja/i.test(v.lang||"") || /japanese|日本/i.test(v.name||""));
  if(!ja.length){ jaVoice=null; return; }
  // 自然な声を優先（Chromeの「Google 日本語」やOS標準のニューラル音声など）
  const score=v=>{
    const n=(v.name||"").toLowerCase(); let s=0;
    if(n.includes("google")) s+=6;
    if(n.includes("natural")||n.includes("neural")) s+=6;
    if(n.includes("online")) s+=3;
    if(/nanami|ayumi|haruka|sayaka|mizuki|kyoko|o-?ren|otoya/i.test(n)) s+=2; // 既知の自然な音声
    if(v.localService===false) s+=1;
    return s;
  };
  ja.sort((a,b)=>score(b)-score(a));
  jaVoice=ja[0];
}
if("speechSynthesis" in window){ speechSynthesis.onvoiceschanged=pickVoice; pickVoice(); }
// speak(text): resolves when the voice finishes (timing is anchored to audio)
function speak(text,{rate=1.2,pitch=1.4}={}){
  return new Promise(res=>{
    if(abortNow){ res(); return; }
    const estimate=Math.max(600,[...text].length*130);
    if(!voiceOn || !("speechSynthesis" in window)){ setTimeout(res,Math.max(450,[...text].length*95)); return; }
    try{
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.lang="ja-JP"; if(jaVoice) u.voice=jaVoice; u.rate=rate; u.pitch=pitch; u.volume=gameVolume;
      let done=false; const fin=()=>{ if(!done){done=true;res();} };
      u.onend=fin; u.onerror=fin;
      speechSynthesis.speak(u);
      setTimeout(fin, estimate+1500); // safety net if onend never fires
    }catch(e){ setTimeout(res,estimate); }
  });
}

/* ---------- 出力音量（アプリ内で調整） ---------- */
// iOSはmedia要素の volume が効かないため、Web Audioのゲインで全体音量を制御する
let audioCtx=null, masterGain=null, sfxAudio=null, gameVolume=0.9;
const _routed=new WeakSet();
function ensureAudioGraph(){
  if(audioCtx) return audioCtx;
  try{
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain(); masterGain.gain.value=gameVolume;
    masterGain.connect(audioCtx.destination);
    routeMedia(aiVid); routeMedia(rewardVideo);
    sfxAudio=new Audio(); sfxAudio.preload="auto"; routeMedia(sfxAudio);
  }catch(e){ audioCtx=null; }
  return audioCtx;
}
function routeMedia(el){
  if(!audioCtx||!masterGain||!el||_routed.has(el)) return;
  try{ audioCtx.createMediaElementSource(el).connect(masterGain); _routed.add(el); }catch(e){}
}
function resumeAudio(){ try{ if(audioCtx&&audioCtx.state==="suspended") audioCtx.resume(); }catch(e){} }
function setGameVolume(v){
  gameVolume=Math.max(0,Math.min(1,Math.round(v*100)/100));
  if(masterGain) masterGain.gain.value=gameVolume;
  const el=document.getElementById("volPct"); if(el) el.textContent=Math.round(gameVolume*100)+"%";
}

/* ---------- microphone: detect the user's spoken "ホイ" ---------- */
let analyser=null, micBuf=null;
function setupAudio(stream){
  try{
    if(!stream.getAudioTracks || stream.getAudioTracks().length===0) return;
    ensureAudioGraph();
    const ac=audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    audioCtx=ac;
    const src=ac.createMediaStreamSource(stream);
    analyser=ac.createAnalyser(); analyser.fftSize=512;
    src.connect(analyser); micBuf=new Uint8Array(analyser.fftSize);
    if(ac.state==="suspended") ac.resume();
  }catch(e){ analyser=null; }
}
function micLevel(){
  if(!analyser) return 0;
  analyser.getByteTimeDomainData(micBuf);
  let s=0; for(let i=0;i<micBuf.length;i++){ const v=(micBuf[i]-128)/128; s+=v*v; }
  return Math.sqrt(s/micBuf.length); // RMS 0..1
}
// Detect the user's chant "あっち向いて … ホイ!".
// Waits through the first phrase ("あっち向いて"), the pause after it, then
// returns as soon as the SECOND utterance ("ホイ!") begins.
// resolves "hoi" / "timeout" / "noaudio".
async function waitForHoi(maxMs=8000){
  if(!analyser){ await wait(1200); return "noaudio"; }
  // 環境音を測る（話し始める前の一瞬）。うるさい環境でも拾えるよう上限をつける
  let base=0,n=0; const bEnd=performance.now()+280;
  while(performance.now()<bEnd){ if(abortNow) return "timeout"; base+=micLevel(); n++; await wait(20); }
  base = n ? base/n : 0.02;
  base = Math.min(base, 0.06);                            // 話し声で汚れても閾値が上がりすぎないように
  const onTh =Math.max(0.045, base*1.7);                 // 話し始め（低めで拾いやすく）
  const offTh=Math.max(0.028, base*1.25);                // 無音とみなす
  const deadline=performance.now()+maxMs;
  // ① 「あっち向いて…」の話し始めを待つ
  let started=false;
  while(performance.now()<deadline){
    if(abortNow) return "timeout";
    if(micLevel()>onTh){ started=true; break; }
    await wait(12);
  }
  if(!started) return "timeout";
  // ② 発話中は待機。しっかり静かになったら＝「…ホイ」を言い終えた直後
  const endGap=300;                                       // これだけ静かが続いたら発話終了
  let quietStart=null;
  while(performance.now()<deadline){
    if(abortNow) return "timeout";
    if(micLevel()<offTh){
      if(quietStart==null) quietStart=performance.now();
      else if(performance.now()-quietStart>=endGap) return "hoi";   // ← ホイの直後
    } else quietStart=null;
    await wait(12);
  }
  return "hoi";                                           // 時間切れでも進行
}

let scoreMe=0, scoreAi=0, gamePhase="IDLE", busy=false;
let roundId=0, abortNow=false;   // for the "ゲーム中止" button
const wait=ms=>new Promise(r=>setTimeout(r,ms));
function setPhase(txt){ phaseEl.textContent=txt; phaseEl.classList.remove("flash");
  void phaseEl.offsetWidth; phaseEl.classList.add("flash"); }
function setResult(txt,cls){ resultLine.textContent=txt; resultLine.className="result "+(cls||""); }
const rndDir=()=>DIRS[Math.floor(Math.random()*4)];
const rndHand=()=>["rock","scissors","paper"][Math.floor(Math.random()*3)];

// read a stable sample over a short window, return most frequent non-null.
// When cueMsg is given, an on-screen "回答してください" banner + countdown bar
// shows the user EXACTLY when to respond, so timing is never guessed.
async function sample(getter, ms=900, cueMsg=null){
  if(cueMsg){ showCue(cueMsg); runCueBar(ms); }
  const counts={}; const end=performance.now()+ms;
  while(performance.now()<end){
    if(abortNow) break;
    const v=getter();
    if(v) counts[v]=(counts[v]||0)+1;
    await wait(50);
  }
  if(cueMsg) hideCue();
  let best=null,n=0; for(const k in counts) if(counts[k]>n){n=counts[k];best=k;}
  return best;
}

const beats={rock:"scissors",scissors:"paper",paper:"rock"}; // key beats value
function jankenOutcome(me,ai){
  if(me===ai) return "draw";
  return beats[me]===ai ? "win" : "lose";
}

async function playRound(){
  if(busy||!camReady) return;
  abortNow=false; const myId=++roundId; const alive=()=>myId===roundId && !abortNow;
  busy=true; playBtn.disabled=true; stopBtn.disabled=false;
  setResult(""); hideAiHand(); hideAiHandSide();
  setAiFace("center"); setAiExpr("idle");
  aiState.textContent="対戦中";

  // ---- janken (timing anchored to the voice) ----
  let outcome, myHand, aiHand;
  while(true){
    aiHand=rndHand();                              // AIの出し手を先に決定
    setPhase("じゃんけん…"); gamePhase="JANKEN";
    aiShowImg(AI_IMG.idle);
    const jkDone=aiPlayVideo(AI_JK[aiHand],{sound:true});  // 動画内の掛け声を使う（TTSは付けない）
    await wait(4700); if(!alive()){ await jkDone; return; }   // 判定開始を0.2秒遅らせる
    setPhase("ぽん！");
    myHand=await sample(()=>live.janken,1600,"✊✌️✋ 手を見せて！");  // 手を出す瞬間を判定
    await jkDone;                                   // 動画の再生完了を待つ
    if(!alive()) return;
    gamePhase="IDLE";
    if(!myHand){
      setAiExpr("idle");
      setResult("手が読み取れませんでした。もう一度✊✌️✋をはっきり見せてね","lose");
      await aiPlayVideo("jk_retry.mp4",{sound:true,keepLast:true}); if(!alive()) return;   // 手が見えなかった→もう一回（最後のフレーム保持で静止画のちらつき防止）
      continue;
    }
    outcome=jankenOutcome(myHand,aiHand);
    setResult(`あなた: ${JK_JP[myHand]}　AI: ${JK_JP[aiHand]}`,"");
    if(outcome==="draw"){ setPhase("あいこ"); await aiPlayVideo(AI_AIKO,{sound:true}); if(!alive()) return; continue; }   // あいこ動画（動画内音声を使用・AI発話なし）
    break;
  }

  hideAiHand();
  if(outcome==="win"){ await aiPlayVideo(AI_DOUZO,{sound:true}); if(!alive()) return; }   // AIが負けた→「どうぞ」動画（動画内音声）
  else { await aiPlayVideo("jk_iku.mp4",{sound:true}); if(!alive()) return; }   // AIが勝った→「あなたの負け。あっちむいてほい、いくよ」動画（動画内音声）
  await wait(200);

  if(outcome==="win"){
    // あなたの番: あなたが「あっち向いて、ホイ！」と声に出す。
    // AIは黙って、あなたの"ホイ"の声のタイミングで顔の向きを変える。
    const aiDir=rndDir();                 // 向きは先に決定（あなたの指を見て決めるわけではない）
    setPhase("あっち向いて…"); gamePhase="USER_POINT";
    aiShowImg("wait_pointing.png");        // あなたが指さすときのAI待機画面
    showCue("「あっち向いて、ホイ！」と声に出して指を向けて");
    const sig=await waitForHoi(7000);     // 「あっち向いて」中は待機し「ホイ！」を検出
    if(!alive()) return;
    hideCue();
    setPhase("ホイ！");
    await wait(60);                        // ← 「ホイ！」の発話直後に
    const faceDone=showAiFaceTurn(aiDir);  //    AIが顔の向きを変える（0.5倍速・最後の向きで静止）
    const myPoint=await sample(()=>live.point,900,"☝️ 指はそのまま！"); if(!alive()) return;
    gamePhase="IDLE";
    await faceDone;                        // 顔が回りきる（最終の向きで静止）まで待つ
    if(!alive()) return;
    await wait(1200);                      // 最終の向きをはっきり見せてから勝敗表示へ（認識できるように）
    if(!alive()) return;
    if(!myPoint){
      setResult("指の向きが読めませんでした",""); await speak("あれ、指が見えなかったな");
    } else if(myPoint===aiDir){
      scoreMe++; scoreMeEl.textContent=scoreMe;
      setResult(`あなたの指:${DIR_JP[myPoint]} = AIの顔:${DIR_JP[aiDir]} → あなたの勝ち！🎉`,"win");
      setPhase("YOU WIN 🎉"); confetti(); await aiPlayVideo(AI_PT_LOSE,{sound:true,keepLast:true});   // AIが負けた動画（動画内音声・AI発話なし）
      if(!alive()) return;
      const choice=await showReward();           // 🎁 ご褒美：続ける / 受取る
      if(choice==="gift") return;                // 受取る→動画→ゲーム終了
    } else {
      setResult(`あなたの指:${DIR_JP[myPoint]} ／ AIの顔:${DIR_JP[aiDir]} → セーフ！続行`,"");
      setPhase("セーフ！"); await aiPlayVideo(AI_DRAW,{sound:true,keepLast:true});   // ドロー動画（動画内音声・AI発話なし／終了後は静止画に戻さず最後のフレームを保持）
    }
  } else {
    // user lost -> AI points (revealed on ホイ); user turns face at the same instant.
    // 顔が「正面」(=向けていない/未検出)なら勝敗にせず、あっち向いてホイをやり直す。
    while(true){
      setPhase("あっち向いて"); await aiPlayVideo("face_right2.mp4",{sound:true}); if(!alive()) return;   // 「あっち向いて」動画（動画内音声）
      const aiDir=rndDir();
      setPhase("ホイ！"); gamePhase="USER_FACE";
      const capFace=sample(()=>live.face,4000,"😊 顔を向けて！");   // iPhone向け：指さし表示（判定ウィンドウ）を約2秒→約4秒に倍増
      detTag.textContent="AIの指: "+DIR_ARROW[aiDir];
      showAiPoint(aiDir);
      playSound("voice_67_80.m4a");
      const myFace=await capFace; if(!alive()) return;
      gamePhase="IDLE";
      if(!myFace || myFace==="center"){
        // 正面のまま → もう一回（じゃんけんはやり直さない）
        setResult("あなたの顔: 正面のまま → もう一回！","");
        setPhase("もう一回！"); await aiPlayVideo("pt_center.mp4",{sound:true,keepLast:true}); if(!alive()) return;   // 正面のまま→もう一度（最後のフレーム保持で静止画のちらつき防止）
        hideAiHand();
        continue;
      }
      // AIがじゃんけんで勝った回の指差しイラストは、勝ち・セーフに関わらず
      // 次のじゃんけんが始まるまで表示し続ける（消さない）
      if(myFace===aiDir){
        scoreAi++; setResult(`AIの指:${DIR_JP[aiDir]} = あなたの顔:${DIR_JP[myFace]} → AIの勝ち…！`,"lose");
        setPhase("AI WINS"); await aiPlayVideo(AI_PT_WIN,{sound:true,keepLast:true});   // AIが勝った動画（動画内音声・AI発話なし）
      } else {
        setResult(`AIの指:${DIR_JP[aiDir]} ／ あなたの顔:${DIR_JP[myFace]} → セーフ！続行`,"");
        setPhase("セーフ！"); await aiPlayVideo(AI_DRAW,{sound:true,keepLast:true});   // ドロー動画（動画内音声・AI発話なし／終了後は静止画に戻さず最後のフレームを保持）
      }
      break;
    }
  }

  scoreMeEl.textContent=scoreMe; scoreAiEl.textContent=scoreAi;
  if(!alive()) return;
  setAiFace("center"); aiState.textContent="待機中";
  busy=false; playBtn.disabled=false; stopBtn.disabled=true;

  if(autoLoop.checked && gamePhase==="IDLE"){
    stopBtn.disabled=false;
    await wait(1400);
    if(autoLoop.checked && !busy && alive()) playRound();
  }
}

/* big arrow cue for AI pointing */
let arrowEl=null;
function showBigArrow(dir){
  hideBigArrow();
  arrowEl=document.createElement("div");
  arrowEl.className="dir-arrow";
  arrowEl.textContent=DIR_ARROW[dir];
  arrowEl.style.position="absolute";
  arrowEl.style.left="50%"; arrowEl.style.top="50%";
  arrowEl.style.transform="translate(-50%,-50%)";
  arrowEl.style.zIndex=5;
  document.querySelector(".faceScene").appendChild(arrowEl);
}
function hideBigArrow(){ if(arrowEl){arrowEl.remove(); arrowEl=null;} }

/* tiny confetti */
function confetti(){
  const box=document.querySelector(".game") || document.body;
  if(!box) return;
  for(let i=0;i<24;i++){
    const c=document.createElement("div");
    c.style.cssText=`position:absolute;width:8px;height:8px;border-radius:2px;
      background:hsl(${Math.random()*360},90%,60%);left:50%;top:20px;pointer-events:none;z-index:9`;
    box.appendChild(c);
    const dx=(Math.random()-0.5)*260, dy=120+Math.random()*80, rot=Math.random()*720;
    c.animate([{transform:`translate(0,0) rotate(0)`,opacity:1},
               {transform:`translate(${dx}px,${dy}px) rotate(${rot}deg)`,opacity:0}],
      {duration:1100+Math.random()*500,easing:"cubic-bezier(.2,.7,.3,1)"}).onfinish=()=>c.remove();
  }
}

/* ---------- reward (勝利のご褒美) ---------- */
const rewardOverlay=$("rewardOverlay"), giftBox=$("giftBox"),
      continueBtn=$("continueBtn"), giftBtn=$("giftBtn"),
      videoOverlay=$("videoOverlay"), rewardVideo=$("rewardVideo"), endOverlay=$("endOverlay");
function showReward(){
  return new Promise(resolve=>{
    setAiExpr("win"); aiSay("ご褒美だよ",true); speak("ご褒美だよ");
    fadeShow(rewardOverlay);
    const clear=()=>{ continueBtn.onclick=null; giftBtn.onclick=null; giftBox.onclick=null; };
    continueBtn.onclick=()=>{ clear(); fadeHide(rewardOverlay); resolve("continue"); };
    const gift=()=>{ clear(); fadeHide(rewardOverlay); playRewardVideo(); resolve("gift"); };
    giftBtn.onclick=gift; giftBox.onclick=gift;
  });
}
function playRewardVideo(){
  abortNow=true; roundId++;                        // ゲーム進行を停止
  if("speechSynthesis" in window) speechSynthesis.cancel();
  busy=false; gamePhase="IDLE";
  fadeShow(videoOverlay);
  try{ rewardVideo.currentTime=0; }catch(e){}
  rewardVideo.onended=endGame;
  const p=rewardVideo.play(); if(p&&p.catch) p.catch(()=>{});
}
function endGame(){
  fadeHide(videoOverlay);
  fadeShow(endOverlay);
  playBtn.disabled=true; stopBtn.disabled=true;
}

/* ---------- wiring ---------- */
startBtn.addEventListener("click", async ()=>{
  startBtn.disabled=true; startBtn.textContent="読み込み中…";
  fadeHide($("startOverlay"));      // 起動ボタンは押したら消す（フェード）
  try{
    // unlock audio with this user gesture + load JP voice
    pickVoice(); ensureAudioGraph(); resumeAudio(); setGameVolume(gameVolume); speak(" ");
    camHint.textContent="カメラを許可…";
    await startCamera();
    camState.textContent="カメラ ON"; camHint.textContent="モデル読み込み中…";
    await initModels();
    running=true; loop();
    aiState.textContent="待機中";
    playBtn.disabled=false;
    // イントロ動画は無し。準備ができたらそのままキャリブレーションへ
    beginCalibration();
  }catch(err){
    warnEl.style.display="block";
    warnEl.innerHTML="カメラまたはモデルの起動に失敗しました：<b>"+(err&&err.message||err)+"</b><br>"+
      "他のアプリ/タブがカメラを使っていないか確認し、カメラとマイクを許可してください。";
    fadeShow($("startOverlay"));     // 失敗したら起動ボタンを戻す（フェード）
    startBtn.disabled=false; startBtn.textContent="▶ ゲーム開始";
  }
});

playBtn.addEventListener("click", ()=>{ if(!busy) playRound(); });
stopBtn.addEventListener("click", ()=>{
  roundId++;                    // 進行中のラウンドを無効化
  abortNow=true;                // 判定ループ・音声を即中断
  if("speechSynthesis" in window) speechSynthesis.cancel();
  busy=false; gamePhase="IDLE";
  hideCue(); hideAiHand(); hideAiHandSide(); hideBigArrow();
  setAiFace("center"); setAiExpr("idle"); aiState.textContent="待機中";
  playBtn.disabled=false; stopBtn.disabled=true;
  setPhase("中止しました");
  setResult("ゲームを中止しました。「じゃんけん！」で再開できます","");
});
/* ---------- 正面キャリブレーション：「オッケー」の発話で確定 ----------
   ※ SpeechRecognition は別途マイク許可を要求する（許可ダイアログが再び出る）ため使わない。
      開始時に取得済みのマイク音声レベルで「発話（オッケー）」を検出して確定する。 */
let calibrated=false;
async function beginCalibration(){
  calibrated=false;
  setPhase("キャリブレーション");
  await aiPlayVideo(AI_INTRO,{sound:true});   // キャリブレーションの案内動画（動画内音声を使用）
  if(!running) return;
  setPhase("正面を向いて「オッケー」と言ってね");
  camHint.textContent="正面を向いて「オッケー」";
  showCue("正面を向いて「オッケー」と言ってね");
  aiSay("正面を向いて、オッケーって言ってね",true);   // 吹き出し表示のみ（AI合成音声なし）
  // マイクの音声レベルで発話を検知（追加の許可ダイアログは出さない）
  while(running && !calibrated){
    const sig=await waitForHoi(6000);   // 声を出したタイミングを検出
    if(sig==="hoi") tryConfirmCalib();
    else if(sig==="noaudio" && live.faceM) tryConfirmCalib();   // マイク不可なら顔が取れ次第確定
    if(calibrated) break;
    await wait(150);
  }
}
function tryConfirmCalib(){
  if(calibrated) return;
  if(live.faceM){
    calibrated=true;
    hideCue(); camHint.textContent="";
    neutral={...live.faceM};
    setResult("正面をセット✅","win");
    aiSay("覚えたよ！",true);
    if(!busy) playRound();                        // じゃんけんを自動スタート
  } else {
    // 顔が取れていない → 聞き続けてもう一度「オッケー」で確定
    setResult("顔が見えないよ。明るい所で正面を向いて、もう一度「オッケー」と言ってね","lose");
  }
}
resetBtn.addEventListener("click", ()=>{
  scoreMe=0;scoreAi=0;scoreMeEl.textContent=0;scoreAiEl.textContent=0;
  setResult("スコアをリセットしました",""); setPhase("スタート待ち");
});
$("settingsBtn").addEventListener("click", ()=>{
  const p=$("settingsPanel");
  p.style.display = (p.style.display==="none") ? "flex" : "none";
});
$("volDown").addEventListener("click", ()=>{ resumeAudio(); setGameVolume(gameVolume-0.15); });
$("volUp").addEventListener("click", ()=>{ resumeAudio(); setGameVolume(gameVolume+0.15); });
setGameVolume(gameVolume);

// (idle glance removed — AI is now image/video based; keep the idle still)
</script>
